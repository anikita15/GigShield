# ─────────────────────────────────────────────
# GigShield AI — Parametric Insurance Stack
# ─────────────────────────────────────────────

services:
  # 💾 Database Layer — Persisted via volume mount
  mongodb:
    image: mongo:7.0-jammy
    container_name: gigshield-mongodb
    restart: always
    ports:
      - "27017:27017" # Exposed locally for DB management (Compass/Shell)
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ⚙️ ML Risk Scoring Service (Python/FastAPI)
  ml-service:
    build:
      context: .
      dockerfile: ml-service/Dockerfile
    container_name: gigshield-ml-service
    restart: always
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./ml-service:/app/ml-service
      - ./shared:/app/shared
    depends_on:
      - mongodb

  # 🛠️ Backend API Server (Node.js/Express)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gigshield-backend
    restart: always
    ports:
      - "3000:3000" # Internal port used by Nginx, but exposed for convenience if needed
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/gigshield
      - JWT_SECRET=${JWT_SECRET:-gigshield-default-prod-secret-2024}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-gigshield-internal-demo-key}
      - ML_SERVICE_URL=http://ml-service:8000
      - CORS_ORIGIN=http://localhost:8080 # Points to Frontend (Nginx edge)
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - /app/node_modules # Prevents local node_modules from overwriting the container's
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  # 🤖 Autonomous Trigger Engine (Standalone Cron process)
  trigger-engine:
    build:
      context: .
      dockerfile: trigger-engine/Dockerfile
    container_name: gigshield-trigger-engine
    restart: always
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/gigshield
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-gigshield-internal-demo-key}
      - BACKEND_URL=http://backend:3000
      - RISK_PAYOUT_THRESHOLD=0.5
      - PAYOUT_COOLDOWN_MS=86400000
      - CRON_SCHEDULE=*/15 * * * *
    volumes:
      - ./trigger-engine:/app/trigger-engine
      - ./shared:/app/shared
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  # 🌐 Frontend Edge (React build served via Nginx Reverse Proxy)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gigshield-frontend
    restart: always
    ports:
      - "8080:80" # Standard HTTP Access Point
    depends_on:
      backend:
        condition: service_healthy

# ─────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
    # NOTE: On Render, this volume should be mapped to a "Persistent Disk" 
    # mount path (e.g. /data/db) in the Render Dashboard dashboard.
